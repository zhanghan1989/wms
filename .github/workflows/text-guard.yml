name: Text Guard

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/public/**"
      - "scripts/check-text-encoding.mjs"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/workflows/text-guard.yml"
  pull_request:
    paths:
      - "apps/api/public/**"
      - "scripts/check-text-encoding.mjs"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/workflows/text-guard.yml"

jobs:
  utf8-and-copy-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate UTF-8 and UI copy
        run: npm run check:text
