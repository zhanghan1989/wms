name: Deploy ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Manual deploy: run prisma migrate deploy"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to ECS by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          port: ${{ secrets.ECS_PORT }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd ~/wms
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            git rev-parse --short HEAD
            docker compose up -d db redis
            echo "Running prisma migrate deploy..."
            docker compose run --rm --build api npm run -w api prisma:migrate:deploy
            docker compose up -d --build api
            docker compose ps
            docker compose logs --tail=120 api || true
            echo "Smoke check static assets..."
            curl -fI http://127.0.0.1:3000/
            curl -fI http://127.0.0.1:3000/app.js
            curl -fsS http://127.0.0.1:3000/app.js -o /tmp/wms_app.js
            grep -q "normalizeErrorMessage" /tmp/wms_app.js
            echo "Smoke check passed."
