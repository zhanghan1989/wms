name: Deploy ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Manual deploy: run prisma migrate deploy"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to ECS by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          port: ${{ secrets.ECS_PORT }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            JOB_START_TS="$(date +%s)"
            retry() {
              max_attempts="$1"
              shift
              attempt=1
              while true; do
                if "$@"; then
                  return 0
                fi
                if [ "${attempt}" -ge "${max_attempts}" ]; then
                  echo "Command failed after ${attempt} attempts: $*"
                  return 1
                fi
                sleep_secs=$((attempt * 5))
                echo "Command failed (attempt ${attempt}/${max_attempts}). Retrying in ${sleep_secs}s: $*"
                sleep "${sleep_secs}"
                attempt=$((attempt + 1))
              done
            }
            timed() {
              label="$1"
              shift
              start_ts="$(date +%s)"
              echo ">>> [start] ${label}"
              "$@"
              end_ts="$(date +%s)"
              elapsed="$((end_ts - start_ts))"
              echo "<<< [done] ${label} (${elapsed}s)"
            }
            timed_retry() {
              label="$1"
              max_attempts="$2"
              shift 2
              start_ts="$(date +%s)"
              echo ">>> [start] ${label}"
              retry "${max_attempts}" "$@"
              end_ts="$(date +%s)"
              elapsed="$((end_ts - start_ts))"
              echo "<<< [done] ${label} (${elapsed}s)"
            }
            cd ~/wms
            timed "git_fetch" git fetch --all --prune
            timed "git_checkout_main" git checkout main
            timed "git_reset_origin_main" git reset --hard origin/main
            timed "git_show_head" git rev-parse --short HEAD
            timed_retry "compose_up_db_redis" 3 docker compose up -d db redis
            timed_retry "compose_build_api_once" 3 docker compose build api
            echo "Running prisma migrate deploy..."
            timed_retry "prisma_migrate_deploy" 3 docker compose run --rm --no-deps api npm run -w api prisma:migrate:deploy
            timed_retry "compose_up_api_recreate" 3 docker compose up -d --force-recreate api
            timed "compose_ps" docker compose ps
            timed "api_logs_tail_120" sh -c "docker compose logs --tail=120 api || true"
            echo "Smoke check static assets..."
            READY=0
            SMOKE_START_TS="$(date +%s)"
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
                READY=1
                echo "API is ready (attempt ${i})."
                break
              fi
              sleep 2
            done
            if [ "${READY}" -ne 1 ]; then
              echo "API readiness check timeout."
              docker compose ps
              docker compose logs --tail=200 api || true
              exit 1
            fi
            SMOKE_END_TS="$(date +%s)"
            echo "<<< [done] smoke_wait_ready ($((SMOKE_END_TS - SMOKE_START_TS))s)"
            timed "smoke_head_root" curl -fI http://127.0.0.1:3000/
            timed "smoke_head_app_js" curl -fI http://127.0.0.1:3000/app.js
            timed "smoke_download_app_js" curl -fsS http://127.0.0.1:3000/app.js -o /tmp/wms_app.js
            timed "smoke_grep_marker" grep -q "normalizeErrorMessage" /tmp/wms_app.js
            JOB_END_TS="$(date +%s)"
            echo "=== Deploy total elapsed: $((JOB_END_TS - JOB_START_TS))s ==="
            echo "Smoke check passed."
